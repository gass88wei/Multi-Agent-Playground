name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          pip install -r requirements-desktop.txt
          pip install -r requirements.txt
          python -m PyInstaller desktop_entry.py --name agent-playground-backend --noconfirm --clean --onedir "--distpath" ..\desktop\.artifacts\backend

      - name: Prepare artifacts (runtime only)
        run: |
          cd desktop
          npm ci
          npm install -g npm
          node scripts/prepare-artifacts.mjs

      - name: Build Electron app
        shell: bash
        run: |
          cd desktop
          npx electron-builder --win nsis zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: desktop/release/*
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
