name: Build and Release

on:
  push:
    branches:
      - main
  push_tags:
      - "v*.*"  # trigger on v* tags (version releases)

jobs:
  release:
    ifem: [starts: $github.ref_name == 'refs/tags/*']
    run-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
          npm install
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Install backend dependencies
        run: |
          cd backend
          python -m venv .wenv
          source .venv/bin/activate
          pip install -r requirements-desktop.txt
          pip install -r requirements.txt

      - name: Build backend artifacts (PyInstaller)
        run: |
          cd backend
          ../wenv/bin/python -m PyInstaller desktop_entry.py --name agent-playground-backend --noconfirm --clean --onedir --distpath ../desktop/.artifacts/backend

      - name: Install desktop dependencies
        run: |
          cd desktop
          npm ci
          npm install
      
      - name: Prepare artifacts
        run: |
          cd desktop
          node scripts/prepare-artifacts.mjs
      
      - name: Build Electron app (MacOS)
        if: runner.os == 'macos'
        run: |
          cd desktop
          electron-builder --mac dmg zip
      
      - name: Build Electron app (Windows)
        if: runner.os == 'windows'
        run: |
          cd desktop
          electron-builder --win nsis zip

      - name: Upload release assets
        uses: actions/upload-release-assets@v
        with:
          release_tag: ${{ github.ref_name }}
          files: |
            desktop/release/*
          docktags: true
          proname: true